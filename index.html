<!DOCTYPE html>
<html>
<head>
  <title>Villa Rose Battery Monitor</title>

  <style>

    body {
      background: #081015;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      color: #55ff88;
    }

    .card {
      background: #13202a;
      border: 1px solid #2e4452;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .ok {
      border-left: 8px solid #33cc66;
    }

    .offline {
      border-left: 8px solid #ff4444;
    }

  </style>
</head>

<body>

<h1>Villa Rose Battery Monitor</h1>

<div id="cards"></div>

<script>

async function loadData() {

  const response = await fetch("battery_latest.json");

  const batteries = await response.json();

  let html = "";

  batteries.forEach(b => {

    html += `
      <div class="card ${b.status == "OK" ? "ok" : "offline"}">

        <h2>${b.name}</h2>

        <p><b>Voltage:</b> ${b.voltage} V</p>

        <p><b>SOC:</b> ${b.soc}%</p>

        <p><b>SOH:</b> ${b.soh}%</p>

        <p><b>Status:</b> ${b.status}</p>

      </div>
    `;
  });

  document.getElementById("cards").innerHTML = html;
}

loadData();

setInterval(loadData, 30000);

</script>

</body>
</html>
